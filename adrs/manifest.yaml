invariants:
- id: INV-0101
  statement: 'Architecture slice generation from source code MUST be deterministic:
    identical inputs

    (source artifacts, extractor configuration, extractor version) MUST produce

    identical slice outputs.

    '
  defined_in: ADR-L-0001
  enforced_by: []
  enforcement_level: must
- id: INV-0102
  statement: 'Extractors MUST use language-native parsing and explicit pattern rules
    for framework

    and API detection; they MUST produce identical outputs for identical inputs per
    INV-0101.

    '
  defined_in: ADR-L-0001
  enforced_by: []
  enforcement_level: must
- id: INV-0103
  statement: 'The extraction graph MUST NOT assert architectural relationships using
    embeddings,

    probabilistic models, or LLM inference over source code or extraction artifacts.

    '
  defined_in: ADR-L-0001
  enforced_by: []
  enforcement_level: must
- id: INV-0104
  statement: 'When an LLM participates in natural-language query translation, it MUST
    NOT receive

    extraction results as input for constructing or modifying architecture slices;
    failure

    to translate MUST fall back to structured query paths without inventing graph
    content.

    '
  defined_in: ADR-L-0001
  enforced_by: []
  enforcement_level: must
- id: INV-0105
  statement: 'When deterministic rules cannot observe a relationship or element, the
    system MUST

    record explicit unknowns per **ADR-L-0006** rather than inferring or guessing.

    '
  defined_in: ADR-L-0001
  enforced_by: []
  enforcement_level: must
- id: INV-0601
  statement: 'When extraction cannot determine a relationship or property that belongs
    in the slice

    model, the system MUST record an explicit unknown rather than inventing a definitive

    edge or attribute from heuristics alone.

    '
  defined_in: ADR-L-0006
  enforced_by: []
  enforcement_level: must
- id: INV-0602
  statement: 'Unknowns MUST be first-order records in the slice documentation contract
    (queryable and

    attributable), not only log lines or informal notes.

    '
  defined_in: ADR-L-0006
  enforced_by: []
  enforcement_level: must
- id: INV-0701
  statement: 'Given the same source artifact inputs and extractor version, identity
    derivation for

    a slice MUST be deterministic and reproducible.

    '
  defined_in: ADR-L-0007
  enforced_by: []
  enforcement_level: must
- id: INV-0702
  statement: 'Identity derivation MUST prefer observable contract anchors (routes,
    table names,

    source paths, integration targets, config keys) over volatile implementation labels

    when those anchors are available.

    '
  defined_in: ADR-L-0007
  enforced_by: []
  enforcement_level: must
- id: INV-0801
  statement: 'Partial extraction MUST NOT silently drop successful slices; failures
    MUST be

    visible via partial status, unknowns, or equivalent documented signals.

    '
  defined_in: ADR-L-0008
  enforced_by: []
  enforcement_level: must
- id: INV-0802
  statement: 'Query responses that combine extracted and asserted facts MUST retain
    provenance

    sufficient to filter or explain conflicts unless a superseding ADR-L defines

    automatic precedence.

    '
  defined_in: ADR-L-0008
  enforced_by: []
  enforcement_level: must
- id: INV-0901
  statement: 'Manual assertions MUST carry provenance sufficient to identify the asserting
    party,

    scope, and evidentiary reference before admission into authoritative query surfaces.

    '
  defined_in: ADR-L-0009
  enforced_by: []
  enforcement_level: must
- id: INV-0902
  statement: 'When extracted and asserted facts contradict, query responses MUST surface
    the

    conflict with both provenances unless a superseding ADR-L defines automatic precedence.

    '
  defined_in: ADR-L-0009
  enforced_by: []
  enforcement_level: must
- id: INV-1901
  statement: 'The Gateway MUST NOT sign canonical artifacts or eligibility outcomes
    as substitutes

    for ORG attestation of canonical truth.

    '
  defined_in: ADR-L-0019
  enforced_by: []
  enforcement_level: must
- id: INV-2001
  statement: 'ORG signing requirements MUST NOT be expanded to cover derived query
    results,

    enforcement-only outcomes, or caches without a new ADR-L that documents the rationale.

    '
  defined_in: ADR-L-0020
  enforced_by: []
  enforcement_level: must
- id: INV-2101
  statement: 'Cached trust material MUST NOT be used to approve execution eligibility;
    if used for

    read-only paths, outputs MUST be marked non-authoritative and canonical promotion
    MUST

    be blocked.

    '
  defined_in: ADR-L-0021
  enforced_by: []
  enforcement_level: must
- id: INV-2201
  statement: 'If any prerequisite for execution eligibility or canonical promotion
    cannot be fully

    validated, the implementation MUST deny the authoritative action (fail closed).

    '
  defined_in: ADR-L-0022
  enforced_by: []
  enforcement_level: must
- id: INV-2202
  statement: 'Read-only evaluation paths used while fail-closed is active MUST NOT
    approve execution

    eligibility or canonical promotion and MUST surface degraded, non-authoritative
    status.

    '
  defined_in: ADR-L-0022
  enforced_by: []
  enforcement_level: must
- id: INV-2301
  statement: 'No component other than Gateway MAY treat local or merge-time validation
    success as

    sufficient to authorize execution eligibility when Gateway has not returned an
    explicit

    ALLOW outcome per contract.

    '
  defined_in: ADR-L-0023
  enforced_by: []
  enforcement_level: must
- id: INV-2401
  statement: 'Execution MUST NOT begin until Gateway returns ALLOW; optimistic or
    asynchronous

    eligibility patterns that proceed before ALLOW are forbidden for authoritative
    execution.

    '
  defined_in: ADR-L-0024
  enforced_by: []
  enforcement_level: must
- id: INV-2501
  statement: 'Gateway MUST NOT infer, default, case-fold, pattern-match, or hierarchically
    interpret

    environment identifiers for v1 eligibility; only exact equality on declared identifiers

    is permitted.

    '
  defined_in: ADR-L-0025
  enforced_by: []
  enforcement_level: must
- id: INV-2601
  statement: 'Gateway MUST NOT treat raw invariant payload comparison as authoritative
    for conflict

    detection; authoritative conflict signal is the signed Fabric `conflict_status`
    field.

    '
  defined_in: ADR-L-0026
  enforced_by: []
  enforcement_level: must
- id: INV-2701
  statement: 'Gateway MUST NOT upgrade or infer `scope_semantics_version`; mismatched
    declared

    versions between Trust Registry and Context Bundle MUST result in denial.

    '
  defined_in: ADR-L-0027
  enforced_by: []
  enforcement_level: must
- id: INV-2801
  statement: 'During execution eligibility evaluation, Gateway MUST rely on signed
    attestations and

    authoritative reference resolution rules in ADR-L-0024, not live Fabric queries,
    to

    obtain canonical claims.

    '
  defined_in: ADR-L-0028
  enforced_by: []
  enforcement_level: must
- id: INV-2901
  statement: 'Gateway MUST NOT be modeled as holding ORG attestation authority to
    sign canonical

    artifacts or Fabric Attestations; its authority is limited to verification and

    enforcement per ADR-L-0019 and ADR-L-0028.

    '
  defined_in: ADR-L-0029
  enforced_by: []
  enforcement_level: must
- id: INV-3001
  statement: 'Runtime and kernel repositories MUST NOT treat repo-local types, tests,
    or informal

    prose as authoritative over ste-spec `contracts/` and published invariants for
    the

    same handoff surfaces.

    '
  defined_in: ADR-L-0030
  enforced_by: []
  enforcement_level: must
- id: INV-3101
  statement: 'ste-runtime MUST NOT emit caller-facing admission or execution-eligibility
    decision

    semantics; ste-kernel alone emits `KernelAdmissionAssessment` per published contracts.

    '
  defined_in: ADR-L-0031
  enforced_by: []
  enforcement_level: must
- id: INV-3201
  statement: 'Version failures, closed-object shape failures, and semantic invariant
    failures at the

    documented handoff MUST be fail-closed conditions for downstream compilation and

    admission per ADR-L-0033 and ADR-L-0035.

    '
  defined_in: ADR-L-0032
  enforced_by: []
  enforcement_level: must
- id: INV-3301
  statement: 'Ad hoc extension fields on closed handoff objects MUST NOT be treated
    as contract-valid

    without an explicit ste-spec contract and invariant update.

    '
  defined_in: ADR-L-0033
  enforced_by: []
  enforcement_level: must
- id: INV-3401
  statement: 'Until the rule-projection envelope family is promoted to accepted contract
    status,

    ste-kernel integrations MUST treat draft schemas as interface-only and MUST NOT
    imply

    normative closure beyond published disclaimers.

    '
  defined_in: ADR-L-0034
  enforced_by: []
  enforcement_level: should
- id: INV-3501
  statement: 'Extensions to mechanical Architecture IR enumerations MUST be ste-spec
    contract changes

    with pin discipline; semantic additions MAY land in ste-spec prose first with
    explicit

    realization notes.

    '
  defined_in: ADR-L-0035
  enforced_by: []
  enforcement_level: must
- id: INV-3601
  statement: 'When README content conflicts with a normative ADR, invariant, schema,
    contract, or

    Architecture IR doctrine, the normative artifact MUST govern and README MUST be
    corrected.

    '
  defined_in: ADR-L-0036
  enforced_by: []
  enforcement_level: must
- id: INV-3701
  statement: 'Repository README files MUST remain subordinate to normative artifacts;
    they MUST NOT

    introduce new normative rules, invariants, or contract shapes without an ADR-L
    or contract change.

    '
  defined_in: ADR-L-0037
  enforced_by: []
  enforcement_level: must
- id: INV-3801
  statement: 'Repositories MUST apply the ste-spec architecture doctrine that defines
    artifact taxonomy

    kinds and versioning posture when determining version-control treatment for STE
    artifacts.

    '
  defined_in: ADR-L-0038
  enforced_by: []
  enforcement_level: must
- id: INV-3802
  statement: 'Spine doctrine and lifecycle projections MUST NOT introduce new top-level
    taxonomy

    kinds or alter VCS posture established in ADR-L-0038 without amending this ADR-L.

    '
  defined_in: ADR-L-0038
  enforced_by: []
  enforcement_level: must
- id: INV-3901
  statement: 'Canonical architecture diagrams MUST NOT be the sole location where
    a rule, requirement,

    or invariant is first defined; authoritative text remains in ADRs, contracts,
    or doctrine.

    '
  defined_in: ADR-L-0039
  enforced_by: []
  enforcement_level: must
- id: INV-4001
  statement: 'Supporting Spine documents in `architecture/` MUST explain or map ADR-L-0040
    without

    redefining Spine stages, authority ownership, or ADR-L-0038 taxonomy kinds.

    '
  defined_in: ADR-L-0040
  enforced_by: []
  enforcement_level: must
- id: INV-4101
  statement: 'Repositories MUST NOT maintain a second authoritative compile path that
    redefines ste-spec

    contract shapes for `ArchitectureEvidence` or normative Architecture IR schema
    without an

    explicit superseding ADR-L.

    '
  defined_in: ADR-L-0041
  enforced_by: []
  enforcement_level: must
- id: INV-4201
  statement: 'New capabilities MUST be classified explicitly as public specification,
    interface-only

    publication, or closed implementation per this boundary before expanding ste-spec
    contracts.

    '
  defined_in: ADR-L-0042
  enforced_by: []
  enforcement_level: should
- id: INV-5001
  statement: 'Admission evaluation MUST identify a requested_action from the canonical
    vocabulary

    (design, change, build, deploy, operate, assess, promote) or an explicitly documented

    extension; omission MUST be treated as invalid input per the Kernel Decision Contract

    fail-closed rules.

    '
  defined_in: ADR-L-1001
  enforced_by: []
  enforcement_level: must
- id: INV-5002
  statement: 'Informational-only actions MUST NOT emit caller-facing allow/deny semantics
    at the

    admission boundary; they MAY produce reports, findings, and explanations only.

    '
  defined_in: ADR-L-1001
  enforced_by: []
  enforcement_level: must
- id: INV-5003
  statement: 'Actions design, change, build, deploy, operate, and promote are subject
    to admission

    decisions unless explicitly routed to assessment-only mode; assess is informational

    for admission authority and MUST use the assessment pipeline outputs instead of

    admission allow/deny semantics.

    '
  defined_in: ADR-L-1001
  enforced_by: []
  enforcement_level: must
- id: INV-5011
  statement: 'Admission input closure MUST include validated Architecture IR slice
    (or compiled IR

    handle), evidence bundle reference, governance posture, active ruleset identity,

    requested_action, environment, and evaluation scope sufficient to reproduce the
    decision.

    '
  defined_in: ADR-L-1002
  enforced_by: []
  enforcement_level: must
- id: INV-5012
  statement: 'DENY and CONDITIONAL outcomes MUST NOT be represented as successful
    boot or successful

    unvalidated IR consumption.

    '
  defined_in: ADR-L-1002
  enforced_by: []
  enforcement_level: must
- id: INV-5021
  statement: 'Posture MUST modulate admission outcomes only through declared, deterministic
    rules;

    posture MUST NOT override normative architecture authority in ste-spec.

    '
  defined_in: ADR-L-1003
  enforced_by: []
  enforcement_level: must
- id: INV-5022
  statement: 'Golden and locked postures MUST impose stricter or equal constraints
    compared to

    governed baseline for the same action class unless explicitly documented exceptions
    exist.

    '
  defined_in: ADR-L-1003
  enforced_by: []
  enforcement_level: should
- id: INV-5031
  statement: 'IR validation failure MUST surface as boot/integration failure, not
    as a successful

    admission ALLOW outcome.

    '
  defined_in: ADR-L-1004
  enforced_by: []
  enforcement_level: must
- id: INV-5032
  statement: 'Freshness interpretations for identical inputs MUST be stable for deterministic
    replay

    of admission outcomes.

    '
  defined_in: ADR-L-1004
  enforced_by: []
  enforcement_level: must
- id: INV-5041
  statement: 'Drift categorization MUST be exhaustive for known inputs; unknown drift
    MUST be

    surfaced as a primary-tier finding, not ignored.

    '
  defined_in: ADR-L-1005
  enforced_by: []
  enforcement_level: must
- id: INV-5042
  statement: 'Default drift outcomes MUST be documented per drift kind; tightening
    by posture or Golden

    status MUST remain deterministic.

    '
  defined_in: ADR-L-1005
  enforced_by: []
  enforcement_level: must
- id: INV-5051
  statement: 'Evidence MUST NOT be interpreted as normative architecture authority;
    overrides MUST

    flow from governance artifacts, not from raw observations alone.

    '
  defined_in: ADR-L-1006
  enforced_by: []
  enforcement_level: must
- id: INV-5061
  statement: 'Promotion to Golden MUST be reproducibly justified from IR, evidence,
    posture, and

    explicit promotion records; silent promotion MUST be forbidden.

    '
  defined_in: ADR-L-1007
  enforced_by: []
  enforcement_level: must
- id: INV-5071
  statement: 'DENY MUST prohibit execution of the requested_action; ALLOW MUST explicitly
    clear the

    action subject to downstream enforcement surfaces; CONDITIONAL MUST require documented

    preconditions before execution; WARNING MUST surface non-blocking findings without

    implying allow unless paired with ALLOW or CONDITIONAL clearance.

    '
  defined_in: ADR-L-1008
  enforced_by: []
  enforcement_level: must
- id: INV-5081
  statement: 'Determinism — Given the same Architecture IR bundle, evidence bundle,
    governance

    posture, active rules, and requested_action (plus fixed evaluation scope and

    environment), the kernel MUST produce the same decision outcome and the same structured

    explanation skeleton.

    '
  defined_in: ADR-L-1009
  enforced_by: []
  enforcement_level: must
- id: INV-5082
  statement: 'Explainability — Every admission decision MUST cite the specific ADRs,
    IR elements,

    rules, invariants, posture, or evidence observations that caused the outcome;
    vague

    summaries without pointers are non-conformant.

    '
  defined_in: ADR-L-1009
  enforced_by: []
  enforcement_level: must
- id: INV-5083
  statement: 'Fail-closed — Missing, invalid, or unverifiable required inputs MUST
    yield DENY or

    CONDITIONAL outcomes that do not allow the requested_action; silent ALLOW is forbidden.

    '
  defined_in: ADR-L-1009
  enforced_by: []
  enforcement_level: must
