schema_version: '1.0'
adr_type: logical
id: ADR-L-0021
title: Gateway Trust Verification Model
status: accepted
created_date: '2025-12-23'
modified_date: '2026-03-29'
authors:
- Erik Gallmann
- ste-spec
domains:
- governance
- gateway
tags:
- trust-registry
- fail-closed
context: |
  Gateway is not a trust-registry principal; trust checks run per eligibility evaluation;
  registry outages fail execution closed; bootstrap material only anchors registry
  verification; cached trust cannot authorize execution.

  Legacy: `adrs/published/ADR-021-gateway-trust-verification.md`.

  **Reconciliation vs ADR-L-100x:** **coexist-with-precedence** — **ADR-L-1009** states
  kernel fail-closed posture; this ADR specializes **Gateway trust verification** mechanics.
related_adrs:
- ADR-L-0019
- ADR-L-0020
- ADR-L-0022
- ADR-L-1009
decisions:
- id: DEC-2101
  summary: Gateway is not a Trust Registry principal and performs per-request trust verification
  rationale: |
    Avoids self-referential trust entries and ensures revocations and expirations are
    respected at evaluation time.
  consequences:
    positive:
    - Contemporaneous trust decisions
    negative:
    - Higher verification load per request
- id: DEC-2102
  summary: Fail closed when the Trust Registry is unavailable; bootstrap keys only verify the registry; cache cannot authorize execution
  rationale: |
    Prevents stale or offline trust from authorizing execution; read-only degraded modes
    must be explicitly non-authoritative.
  consequences:
    positive:
    - Stronger security posture
    negative:
    - Availability coupling to registry health
invariants:
- id: INV-2101
  statement: |
    Cached trust material MUST NOT be used to approve execution eligibility; if used for
    read-only paths, outputs MUST be marked non-authoritative and canonical promotion MUST
    be blocked.
  scope: global
  enforcement_level: must
  enforcement_mechanism: policy
  verification_method: audit
  rationale: |
    Mitigates revocation and staleness attacks.
  upheld_by_decisions:
  - DEC-2102
gaps:
- id: GAP-2101
  question: Physical deployment patterns for registry HA belong in ADR-PS when authored
  impact: low
  blocking: false
