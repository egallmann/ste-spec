decisions:
- id: DEC-4001
  summary: Define eleven canonical Spine lifecycle stages from Intent Definition through Intent Update and Remediation
  rationale: |
    Provides one explicit end-to-end vocabulary referenced across ste-spec and consumers.
  consequences:
    positive:
    - Shared stage language
    negative:
    - Narrower local lifecycles remain valid in their scopes
- id: DEC-4002
  summary: Document authority categories (normative, implementation truth, proof, derived, evidence, reports, admission, governance) without transferring ownership via state alone
  rationale: |
    Separates who governs truth from readiness states.
  consequences:
    positive:
    - Clear enforcement and observation loci
    negative:
    - Requires careful mapping in supporting doctrine
- id: DEC-4003
  summary: Establish precedence on apparent conflicts — ADR-L-0040 controls Spine lifecycle and authority transitions; ADR-L-0038 controls taxonomy and VCS posture; supporting `architecture/` doctrine is subordinate; analysis-only material is non-normative
  rationale: |
    Prevents accidental override via explanatory documents.
  consequences:
    positive:
    - Deterministic interpretation order
    negative:
    - Supporting docs must avoid contradictory claims
invariants:
- id: INV-4001
  statement: |
    Supporting Spine documents in `architecture/` MUST explain or map ADR-L-0040 without
    redefining Spine stages, authority ownership, or ADR-L-0038 taxonomy kinds.
  scope: global
  enforcement_level: must
  enforcement_mechanism: policy
  verification_method: audit
  rationale: |
    Keeps supporting doctrine subordinate.
  upheld_by_decisions:
  - DEC-4003
gaps:
- id: GAP-4001
  question: Visual projections (e.g. STE-Spine-Lifecycle.md) remain subordinate; regenerate when stages change
  impact: low
  blocking: false
