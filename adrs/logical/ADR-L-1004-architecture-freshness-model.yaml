schema_version: '1.0'
adr_type: logical
id: ADR-L-1004
title: Architecture Freshness Model
status: proposed
created_date: '2026-03-28'
authors:
- ste-spec
domains:
- governance
- kernel
- evidence
tags:
- freshness
- staleness
context: |
  Freshness distinguishes whether integration-state (Architecture IR) and observational
  state (evidence) are current enough for the decision at hand. IR freshness and evidence
  freshness are distinct signals and MUST NOT be conflated.

  Failure modes MUST align with ADR-031 and `execution/STE-Kernel-Execution-Model.md`:
  invalid IR blocks boot; admission operates only on validated IR projections.
decisions:
- id: DEC-6431
  summary: Define IR invalid as boot failure preventing operational kernel use
  rationale: |
    Unvalidated IR cannot be a trustworthy substrate for admission or orchestration.
- id: DEC-6432
  summary: Map IR stale to CONDITIONAL or DENY per posture and rules
  rationale: |
    Stale declared architecture may still be structurally valid but untrustworthy for action.
- id: DEC-6433
  summary: Map evidence stale to WARNING or CONDITIONAL default bands
  rationale: |
    Evidence lag may warn or gate without necessarily invalidating IR structure.
- id: DEC-6434
  summary: Map evidence missing to CONDITIONAL or DENY per required evidence classes
  rationale: |
    Missing required observations cannot be treated as silent assent.
- id: DEC-6435
  summary: Treat IR and evidence mismatch as drift classification input
  rationale: |
    Mismatch is not resolved by picking a winner; it is classified per ADR-L-1005.
related_adrs:
- ADR-L-1002
- ADR-L-1005
- ADR-L-1009
invariants:
- id: INV-5031
  statement: |
    IR validation failure MUST surface as boot/integration failure, not as a successful
    admission ALLOW outcome.
  scope: global
  enforcement_level: must
  enforcement_mechanism: policy
  verification_method: automated
  rationale: |
    Matches STE kernel execution model: invalid IR cannot underpin successful admission.
- id: INV-5032
  statement: |
    Freshness interpretations for identical inputs MUST be stable for deterministic replay
    of admission outcomes.
  scope: global
  enforcement_level: must
  enforcement_mechanism: design
  verification_method: manual
  rationale: |
    Deterministic replay and audit require stable freshness classification for identical inputs.
gaps:
- id: GAP-5031
  question: Required evidence classes per action and environment
  impact: high
  blocking: false
